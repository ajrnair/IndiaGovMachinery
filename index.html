<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive visualization of the Republic of India's complete government structure - Ministries, Departments, Bodies, Budget & more">
    <title>Machinery of Government - India</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #5b7c99; --primary-dark: #4a6479; --accent: #7c9885;
            --accent-warm: #b89968; --bg: #f5f5f0; --card-bg: #fafaf8;
            --text: #2d3436; --text-light: #7c8288; --border: #e8e8e3;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a2e; --card-bg: #222240; --text: #e0e0e0;
                --text-light: #a0a0b0; --border: #333355;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #5b7c99 0%, #7c9885 100%);
            color: white; padding: 1.5rem 1rem; text-align: center;
            position: relative;
        }
        header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.2rem; }
        header p { opacity: 0.85; font-size: 0.9rem; }
        .nav-link {
            position: absolute; top: 1rem; left: 1rem; color: white;
            text-decoration: none; font-size: 0.85rem; opacity: 0.8;
        }
        .nav-link:hover { opacity: 1; }
        .last-updated { position: absolute; top: 1rem; right: 1rem; font-size: 0.72rem; opacity: 0.7; }
        .leaders {
            display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.8rem; flex-wrap: wrap;
        }
        .leader-badge {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.15); border-radius: 16px;
            padding: 0.25rem 0.7rem; font-size: 0.78rem;
        }
        .leader-badge .role { opacity: 0.7; }

        /* Controls */
        .controls {
            max-width: 1400px; margin: 0 auto; padding: 0.8rem 1rem;
            position: sticky; top: 0; z-index: 100; background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .controls-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
        .search-box {
            flex: 1; min-width: 180px; padding: 0.5rem 0.8rem; border: 1px solid var(--border);
            border-radius: 8px; font-size: 0.85rem; background: var(--card-bg);
            color: var(--text); outline: none;
        }
        .search-box:focus { border-color: var(--primary); }
        .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .view-btn {
            padding: 0.45rem 0.9rem; border: none; background: var(--card-bg);
            color: var(--text); cursor: pointer; font-size: 0.82rem;
            border-right: 1px solid var(--border); transition: all 0.2s;
        }
        .view-btn:last-child { border-right: none; }
        .view-btn.active { background: var(--primary); color: white; }
        .view-btn:hover:not(.active) { background: var(--border); }
        .stats-bar {
            display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-light);
            margin-top: 0.4rem; flex-wrap: wrap;
        }
        .stats-bar strong { color: var(--text); }

        /* Sunburst */
        .sunburst-container {
            display: flex; justify-content: center; align-items: flex-start;
            padding: 1rem; gap: 1.5rem; max-width: 1400px; margin: 0 auto;
            flex-wrap: wrap;
        }
        #sunburstSvg { cursor: pointer; }
        .sunburst-arc { stroke: var(--bg); stroke-width: 1.5px; transition: opacity 0.2s; }
        .sunburst-arc:hover { opacity: 0.8; }
        .sunburst-label { pointer-events: none; font-size: 10px; fill: white;
            text-anchor: middle; dominant-baseline: middle;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5); font-weight: 500;
        }
        .sunburst-center-text { font-size: 14px; font-weight: 700; fill: var(--text); text-anchor: middle; }
        .sunburst-center-sub { font-size: 11px; fill: var(--text-light); text-anchor: middle; }
        .sunburst-breadcrumb {
            display: flex; gap: 0.3rem; align-items: center; font-size: 0.8rem;
            color: var(--text-light); margin-bottom: 0.5rem; flex-wrap: wrap;
            justify-content: center; min-height: 1.5rem;
        }
        .sunburst-breadcrumb span { cursor: pointer; color: var(--primary); }
        .sunburst-breadcrumb span:hover { text-decoration: underline; }

        /* Info Panel (right side of sunburst) */
        .info-panel {
            flex: 0 0 340px; background: var(--card-bg); border-radius: 12px;
            border: 1px solid var(--border); padding: 1.2rem;
            box-shadow: var(--shadow-md); max-height: 80vh; overflow-y: auto;
        }
        .info-panel h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
        .info-type {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
            font-size: 0.7rem; color: white; font-weight: 500; margin-bottom: 0.6rem;
        }
        .info-field {
            display: flex; justify-content: space-between; padding: 0.35rem 0;
            border-bottom: 1px solid var(--border); font-size: 0.82rem;
        }
        .info-field-label { color: var(--text-light); }
        .info-field-value { font-weight: 500; text-align: right; max-width: 60%; }
        .info-section { margin-top: 1rem; }
        .info-section h3 { font-size: 0.82rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
        .info-list { list-style: none; }
        .info-list li {
            padding: 0.3rem 0.5rem; border-radius: 6px; font-size: 0.8rem;
            margin-bottom: 0.2rem; background: var(--bg); cursor: pointer;
        }
        .info-list li:hover { background: var(--border); }
        .info-empty { color: var(--text-light); font-size: 0.9rem; text-align: center; padding: 2rem; }

        /* Cards View */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem; max-width: 1400px; margin: 0 auto; padding: 1rem;
        }
        .ministry-card {
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
            padding: 1rem; cursor: pointer; transition: all 0.3s;
            box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
        }
        .ministry-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
        .type-indicator { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .card-header { display: flex; align-items: flex-start; gap: 0.7rem; margin-bottom: 0.6rem; }
        .minister-avatar {
            width: 38px; height: 38px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 600;
            font-size: 0.8rem; color: white; flex-shrink: 0;
        }
        .card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.3; }
        .card-minister { font-size: 0.78rem; color: var(--text-light); margin-top: 0.1rem; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; }
        .budget-bar-container { flex: 1; margin-right: 0.8rem; }
        .budget-label { color: var(--text-light); margin-bottom: 0.15rem; font-size: 0.72rem; }
        .budget-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .budget-bar-fill { height: 100%; border-radius: 3px; }
        .dept-badge { background: var(--border); padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; color: var(--text-light); white-space: nowrap; }
        .card-expanded { margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border); display: none; }
        .card-expanded.show { display: block; }
        .dept-list { list-style: none; }
        .dept-list li { padding: 0.25rem 0; font-size: 0.78rem; color: var(--text-light); border-bottom: 1px solid var(--border); }
        .dept-list li:last-child { border-bottom: none; }

        /* Budget Treemap */
        .treemap-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .treemap-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1rem; }
        .treemap-total { font-size: 1.3rem; font-weight: 700; }
        .treemap-subtitle { font-size: 0.82rem; color: var(--text-light); }
        .treemap { display: flex; flex-wrap: wrap; gap: 3px; border-radius: 12px; overflow: hidden; background: var(--border); padding: 3px; min-height: 450px; }
        .treemap-cell {
            border-radius: 6px; padding: 0.5rem; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.2s; min-height: 50px; overflow: hidden;
        }
        .treemap-cell:hover { opacity: 0.85; }
        .treemap-cell-name { font-size: 0.72rem; font-weight: 600; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); line-height: 1.2; }
        .treemap-cell-value { font-size: 0.68rem; color: rgba(255,255,255,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .treemap-tooltip {
            position: fixed; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 0.7rem; font-size: 0.78rem;
            box-shadow: var(--shadow-lg); pointer-events: none; z-index: 1000; display: none;
        }

        .view-content { display: none; }
        .view-content.active { display: block; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .no-results { text-align: center; padding: 3rem; color: var(--text-light); font-size: 1rem; }

        @media (max-width: 768px) {
            header h1 { font-size: 1.3rem; }
            .sunburst-container { flex-direction: column; align-items: center; }
            .info-panel { flex: 1 1 100%; max-height: none; }
            .cards-grid { grid-template-columns: 1fr; }
        }
        @media print { .controls { display: none; } }
    </style>
</head>
<body>
    <header>
        <a href="https://ajrnair.github.io/FuelPrice/" class="nav-link">&#8592; Fuel Prices</a>
        <span class="last-updated" id="lastUpdated"></span>
        <h1>Machinery of Government &mdash; India</h1>
        <p>Interactive visualization of the Republic of India&rsquo;s government structure</p>
        <div class="leaders" id="leaders"></div>
    </header>
    <div class="controls">
        <div class="controls-row">
            <input type="text" class="search-box" id="searchBox" placeholder="Search ministries, bodies, PSUs, ministers...">
            <div class="view-toggle">
                <button class="view-btn active" data-view="sunburst">Radial</button>
                <button class="view-btn" data-view="cards">Cards</button>
                <button class="view-btn" data-view="budget">Budget</button>
            </div>
        </div>
        <div class="stats-bar" id="statsBar"></div>
    </div>

    <div id="sunburstView" class="view-content active">
        <div class="sunburst-breadcrumb" id="sunburstBreadcrumb"></div>
        <div class="sunburst-container">
            <svg id="sunburstSvg"></svg>
            <div class="info-panel" id="infoPanel">
                <div class="info-empty">Hover over a segment to see details.<br>Click to zoom in. Click center to zoom out.</div>
            </div>
        </div>
    </div>
    <div id="cardsView" class="view-content"></div>
    <div id="budgetView" class="view-content"></div>
    <div class="treemap-tooltip" id="treemapTooltip"></div>
    <script>
    (function() {
        let GOV = null;
        let currentView = 'sunburst';
        let searchTerm = '';

        // Color palette for top-level branches
        const BRANCH_COLORS = [
            '#2c6fbb','#c0392b','#27ae60','#8e44ad','#e67e22','#16a085',
            '#d35400','#2980b9','#e74c3c','#1abc9c','#9b59b6','#f39c12',
            '#3498db','#e74c3c','#2ecc71','#e67e22','#1abc9c','#9b59b6',
            '#34495e','#c0392b','#27ae60','#2980b9','#8e44ad','#f39c12',
            '#16a085','#d35400','#e74c3c','#2c3e50','#27ae60','#3498db',
            '#9b59b6','#e67e22','#1abc9c','#c0392b','#2980b9','#8e44ad',
            '#f39c12','#16a085','#d35400','#34495e','#2ecc71','#e74c3c',
            '#3498db','#9b59b6','#e67e22','#1abc9c','#c0392b','#27ae60',
            '#2980b9','#8e44ad','#f39c12','#16a085','#d35400','#34495e'
        ];

        function lighten(hex, amount) {
            let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            r = Math.min(255, r + amount); g = Math.min(255, g + amount); b = Math.min(255, b + amount);
            return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
        }

        async function init() {
            try {
                const resp = await fetch('government-data.json');
                GOV = await resp.json();
                document.getElementById('lastUpdated').textContent = 'Updated: ' + GOV.metadata.lastUpdated;
                renderLeaders();
                renderStats();
                buildSunburst();
                bindEvents();
            } catch(e) {
                document.getElementById('sunburstView').innerHTML = '<div class="no-results">Failed to load: ' + e.message + '</div>';
            }
        }

        function renderLeaders() {
            const e = GOV.executive;
            document.getElementById('leaders').innerHTML =
                `<div class="leader-badge"><span class="role">President</span> ${e.president.name}</div>
                 <div class="leader-badge"><span class="role">PM</span> ${e.primeMinister.name}</div>
                 <div class="leader-badge"><span class="role">VP</span> ${e.vicePresident.name}</div>`;
        }

        function renderStats() {
            const td = GOV.ministries.reduce((s,m) => s + m.departments.length, 0);
            document.getElementById('statsBar').innerHTML =
                `<span><strong>${GOV.ministries.length}</strong> Ministries</span>
                 <span><strong>${td}</strong> Depts</span>
                 <span><strong>${GOV.constitutionalBodies.length}</strong> Constitutional</span>
                 <span><strong>${GOV.statutoryBodies.length}</strong> Statutory</span>
                 <span><strong>${GOV.autonomousBodies.length}</strong> Autonomous</span>
                 <span><strong>${GOV.publicSectorUnits.length}</strong> PSUs</span>`;
        }

        function bindEvents() {
            document.querySelectorAll('.view-btn').forEach(btn =>
                btn.addEventListener('click', () => switchView(btn.dataset.view))
            );
            document.getElementById('searchBox').addEventListener('input', e => {
                searchTerm = e.target.value.toLowerCase();
                if (currentView === 'cards') renderCards();
                else if (currentView === 'sunburst') buildSunburst();
            });
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(view + 'View').classList.add('active');
            if (view === 'cards') renderCards();
            else if (view === 'budget') renderBudget();
            else if (view === 'sunburst') buildSunburst();
        }

        // ========== SUNBURST ==========
        function buildHierarchy() {
            const root = {
                name: 'Republic of India', children: [], data: { type: 'root' }
            };

            // Executive branch
            const exec = { name: 'Executive', children: [], data: { type: 'branch', head: GOV.executive.primeMinister.name + ' (PM)' } };

            GOV.ministries.forEach((m, i) => {
                if (searchTerm && !m.name.toLowerCase().includes(searchTerm) &&
                    !(m.minister||'').toLowerCase().includes(searchTerm) &&
                    !m.departments.some(d => d.toLowerCase().includes(searchTerm))) return;

                const ministry = {
                    name: m.name.replace('Ministry of ','').replace('Ministry of the ',''),
                    fullName: m.name,
                    children: [],
                    data: { ...m, type: 'ministry', color: BRANCH_COLORS[i % BRANCH_COLORS.length] }
                };

                m.departments.forEach(d => {
                    const dept = { name: d.replace(' (single dept)',''), children: [], data: { type: 'department', parentMinistry: m.name } };
                    // Add related bodies under departments
                    const related = [
                        ...GOV.statutoryBodies.filter(b => b.ministry === m.id).map(b => ({...b, entityType:'statutory'})),
                        ...GOV.autonomousBodies.filter(b => b.ministry === m.id).map(b => ({...b, entityType:'autonomous'})),
                        ...GOV.publicSectorUnits.filter(p => p.ministry === m.id).map(p => ({...p, entityType:'psu'}))
                    ];
                    related.forEach(r => {
                        dept.children.push({ name: r.name, data: { ...r, type: r.entityType }, children: [] });
                    });
                    ministry.children.push(dept);
                });

                exec.children.push(ministry);
            });

            // Constitutional bodies
            const constBranch = { name: 'Constitutional Bodies', children: [], data: { type: 'branch' } };
            GOV.constitutionalBodies.forEach(b => {
                if (searchTerm && !b.name.toLowerCase().includes(searchTerm)) return;
                constBranch.children.push({ name: b.name, data: { ...b, type: 'constitutional' }, children: [] });
            });

            // Legislature
            const legis = { name: 'Legislature', children: [], data: { type: 'branch' } };
            GOV.legislature.parliament.houses.forEach(h => {
                legis.children.push({ name: h.name + ' (' + h.totalSeats + ' seats)', data: { ...h, type: 'legislature' }, children: [] });
            });

            // Judiciary
            const jud = { name: 'Judiciary', children: [], data: { type: 'branch' } };
            jud.children.push({ name: 'Supreme Court', data: { ...GOV.judiciary.supremeCourt, type: 'judiciary' }, children: [] });
            const hcNode = { name: 'High Courts (' + GOV.judiciary.highCourts.length + ')', children: [], data: { type: 'judiciary' } };
            GOV.judiciary.highCourts.forEach(hc => {
                hcNode.children.push({ name: hc.name.replace(' High Court',''), data: { ...hc, type: 'judiciary' }, children: [] });
            });
            jud.children.push(hcNode);
            const tribNode = { name: 'Tribunals (' + GOV.judiciary.tribunals.length + ')', children: [], data: { type: 'judiciary' } };
            GOV.judiciary.tribunals.forEach(t => {
                tribNode.children.push({ name: t.name, data: { ...t, type: 'judiciary' }, children: [] });
            });
            jud.children.push(tribNode);

            root.children = [exec, constBranch, legis, jud].filter(b => b.children.length > 0);
            return root;
        }

        function computeLayout(node, depth, startAngle, endAngle, parentColor) {
            const arcs = [];
            const angle = endAngle - startAngle;
            const color = node.data.color || parentColor ||
                (depth === 1 ? ['#2c6fbb','#e67e22','#27ae60','#8e44ad'][arcs.length % 4] : parentColor);

            if (depth > 0) {
                arcs.push({
                    node, depth, startAngle, endAngle,
                    color: depth === 1 ? color : (depth === 2 ? lighten(color, 30) : (depth === 3 ? lighten(color, 60) : lighten(color, 90)))
                });
            }

            if (node.children && node.children.length > 0) {
                // Weight: ministries by budget or equal
                const weights = node.children.map(c => {
                    if (c.data.budget) return Math.sqrt(c.data.budget);
                    const leafCount = countLeaves(c);
                    return Math.max(1, leafCount);
                });
                const totalWeight = weights.reduce((a,b) => a+b, 0);
                let currentAngle = startAngle;
                node.children.forEach((child, i) => {
                    const childAngle = (weights[i] / totalWeight) * angle;
                    const childColor = depth === 0 ? BRANCH_COLORS[i % BRANCH_COLORS.length] :
                        (child.data.color || color);
                    child.data.color = child.data.color || childColor;
                    arcs.push(...computeLayout(child, depth + 1, currentAngle, currentAngle + childAngle, childColor));
                    currentAngle += childAngle;
                });
            }
            return arcs;
        }

        function countLeaves(node) {
            if (!node.children || node.children.length === 0) return 1;
            return node.children.reduce((s, c) => s + countLeaves(c), 0);
        }

        let currentRoot = null;
        let fullRoot = null;

        function buildSunburst() {
            fullRoot = buildHierarchy();
            currentRoot = fullRoot;
            renderSunburst(currentRoot);
        }

        function renderSunburst(root) {
            const svg = document.getElementById('sunburstSvg');
            const size = Math.min(window.innerWidth - 400, 680);
            const w = Math.max(400, size);
            const h = w;
            const cx = w / 2, cy = h / 2;
            const maxDepth = 4;
            const innerR = w * 0.08;
            const ringW = (w / 2 - innerR - 10) / maxDepth;

            svg.setAttribute('width', w);
            svg.setAttribute('height', h);
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            svg.innerHTML = '';

            const arcs = computeLayout(root, 0, 0, Math.PI * 2, '#5b7c99');
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', `translate(${cx},${cy})`);

            arcs.forEach(arc => {
                if (arc.depth > maxDepth) return;
                const r0 = innerR + (arc.depth - 1) * ringW;
                const r1 = innerR + arc.depth * ringW;
                const path = describeArc(0, 0, r0, r1, arc.startAngle, arc.endAngle);

                const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                el.setAttribute('d', path);
                el.setAttribute('fill', arc.color);
                el.setAttribute('class', 'sunburst-arc');

                el.addEventListener('mouseenter', () => showInfo(arc.node));
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (arc.node.children && arc.node.children.length > 0) {
                        currentRoot = arc.node;
                        renderSunburst(arc.node);
                        updateBreadcrumb(arc.node);
                    }
                });

                g.appendChild(el);

                // Labels for larger arcs
                const arcAngle = arc.endAngle - arc.startAngle;
                if (arcAngle > 0.12 && arc.depth <= 2) {
                    const midAngle = (arc.startAngle + arc.endAngle) / 2;
                    const midR = (r0 + r1) / 2;
                    const lx = Math.cos(midAngle - Math.PI/2) * midR;
                    const ly = Math.sin(midAngle - Math.PI/2) * midR;

                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', lx);
                    label.setAttribute('y', ly);
                    label.setAttribute('class', 'sunburst-label');

                    // Rotate text along arc
                    let rot = (midAngle * 180 / Math.PI) - 90;
                    if (rot > 90 && rot < 270) rot += 180;
                    label.setAttribute('transform', `rotate(${rot},${lx},${ly})`);

                    const maxChars = Math.max(4, Math.floor(arcAngle * midR / 6));
                    let text = arc.node.name;
                    if (text.length > maxChars) text = text.substring(0, maxChars - 1) + '…';
                    label.textContent = text;
                    if (arcAngle > 0.05) g.appendChild(label);
                }
            });

            // Center circle (click to zoom out)
            const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            center.setAttribute('cx', 0);
            center.setAttribute('cy', 0);
            center.setAttribute('r', innerR);
            center.setAttribute('fill', 'var(--card-bg)');
            center.setAttribute('stroke', 'var(--border)');
            center.setAttribute('stroke-width', 1);
            center.style.cursor = 'pointer';
            center.addEventListener('click', () => {
                if (currentRoot !== fullRoot) {
                    currentRoot = fullRoot;
                    renderSunburst(fullRoot);
                    updateBreadcrumb(null);
                }
            });
            g.appendChild(center);

            // Center label
            const cText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            cText.setAttribute('y', -6);
            cText.setAttribute('class', 'sunburst-center-text');
            cText.textContent = root === fullRoot ? '🇮🇳' : '';
            cText.style.fontSize = root === fullRoot ? '24px' : '14px';
            g.appendChild(cText);

            const cSub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            cSub.setAttribute('y', 14);
            cSub.setAttribute('class', 'sunburst-center-sub');
            cSub.textContent = root === fullRoot ? 'India' : '← Back';
            g.appendChild(cSub);

            if (root !== fullRoot) {
                const cName = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                cName.setAttribute('y', -8);
                cName.setAttribute('class', 'sunburst-center-sub');
                cName.style.fontWeight = '600';
                cName.style.fill = 'var(--text)';
                const n = root.name.length > 18 ? root.name.substring(0,17)+'…' : root.name;
                cName.textContent = n;
                g.appendChild(cName);
            }

            svg.appendChild(g);
        }

        function describeArc(cx, cy, r0, r1, startAngle, endAngle) {
            const gap = 0.003;
            const sa = startAngle + gap;
            const ea = endAngle - gap;
            if (ea <= sa) return '';
            const cos1 = Math.cos(sa - Math.PI/2), sin1 = Math.sin(sa - Math.PI/2);
            const cos2 = Math.cos(ea - Math.PI/2), sin2 = Math.sin(ea - Math.PI/2);
            const large = (ea - sa > Math.PI) ? 1 : 0;
            return [
                'M', cx + r0 * cos1, cy + r0 * sin1,
                'L', cx + r1 * cos1, cy + r1 * sin1,
                'A', r1, r1, 0, large, 1, cx + r1 * cos2, cy + r1 * sin2,
                'L', cx + r0 * cos2, cy + r0 * sin2,
                'A', r0, r0, 0, large, 0, cx + r0 * cos1, cy + r0 * sin1,
                'Z'
            ].join(' ');
        }

        function updateBreadcrumb(node) {
            const el = document.getElementById('sunburstBreadcrumb');
            if (!node || node === fullRoot) { el.innerHTML = ''; return; }
            el.innerHTML = `<span onclick="document.getElementById('sunburstSvg').querySelector('circle').dispatchEvent(new Event('click'))">🇮🇳 India</span> › ${node.name}`;
        }

        function showInfo(node) {
            const panel = document.getElementById('infoPanel');
            const d = node.data || {};
            const color = d.color || '#5b7c99';
            const type = d.type || 'entity';
            let html = `<span class="info-type" style="background:${color}">${type}</span>`;
            html += `<h2>${node.fullName || node.name}</h2>`;

            const fields = [];
            if (d.minister) fields.push(['Minister', d.minister]);
            if (d.head) fields.push(['Head', d.head]);
            if (d.budget) fields.push(['Budget 2025-26', formatBudget(d.budget)]);
            if (d.est) fields.push(['Established', d.est]);
            if (d.act) fields.push(['Act', d.act]);
            if (d.mandate) fields.push(['Mandate', d.mandate]);
            if (d.category) fields.push(['Category', d.category]);
            if (d.sector) fields.push(['Sector', d.sector]);
            if (d.revenue) fields.push(['Revenue', d.revenue]);
            if (d.location) fields.push(['Location', d.location]);
            if (d.jurisdiction) fields.push(['Jurisdiction', d.jurisdiction]);
            if (d.article) fields.push(['Article', d.article]);
            if (d.totalSeats) fields.push(['Total Seats', d.totalSeats]);
            if (d.speaker) fields.push(['Speaker', d.speaker]);
            if (d.chairman) fields.push(['Chairman', d.chairman]);
            if (d.chiefJustice) fields.push(['Chief Justice', d.chiefJustice]);
            if (d.totalJudges) fields.push(['Judges', d.totalJudges]);
            if (d.purpose) fields.push(['Purpose', d.purpose]);

            if (fields.length) {
                fields.forEach(([k,v]) => {
                    html += `<div class="info-field"><span class="info-field-label">${k}</span><span class="info-field-value">${v}</span></div>`;
                });
            }

            if (node.children && node.children.length > 0) {
                html += `<div class="info-section"><h3>${node.children.length} Sub-entities</h3><ul class="info-list">`;
                node.children.slice(0, 20).forEach(c => {
                    html += `<li>${c.name}</li>`;
                });
                if (node.children.length > 20) html += `<li style="color:var(--text-light)">...and ${node.children.length - 20} more</li>`;
                html += '</ul></div>';
            }

            if (d.departments) {
                html += `<div class="info-section"><h3>Departments (${d.departments.length})</h3><ul class="info-list">`;
                d.departments.forEach(dept => { html += `<li>${dept}</li>`; });
                html += '</ul></div>';
            }

            panel.innerHTML = html;
        }

        function formatBudget(crore) {
            if (crore >= 100000) return '₹' + (crore/100000).toFixed(1) + 'L Cr';
            if (crore >= 1000) return '₹' + (crore/1000).toFixed(1) + 'K Cr';
            return '₹' + crore + ' Cr';
        }

        function getInitials(name) {
            return name.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
        }

        // ========== CARDS ==========
        function renderCards() {
            const container = document.getElementById('cardsView');
            const items = GOV.ministries.filter(m => {
                if (!searchTerm) return true;
                return m.name.toLowerCase().includes(searchTerm) || (m.minister||'').toLowerCase().includes(searchTerm);
            }).sort((a,b) => (b.budget||0) - (a.budget||0));

            if (!items.length) { container.innerHTML = '<div class="no-results">No results</div>'; return; }

            const grid = document.createElement('div');
            grid.className = 'cards-grid fade-in';
            items.forEach((m,i) => {
                const color = BRANCH_COLORS[i % BRANCH_COLORS.length];
                const card = document.createElement('div');
                card.className = 'ministry-card';
                card.innerHTML = `
                    <div class="type-indicator" style="background:${color}"></div>
                    <div class="card-header">
                        <div class="minister-avatar" style="background:${color}">${getInitials(m.minister||m.name)}</div>
                        <div><div class="card-title">${m.name}</div><div class="card-minister">${m.minister||''}</div></div>
                    </div>
                    <div class="card-meta">
                        ${m.budget ? `<div class="budget-bar-container"><div class="budget-label">${formatBudget(m.budget)}</div><div class="budget-bar"><div class="budget-bar-fill" style="width:${Math.min(100,(m.budget/621940)*100)}%;background:${color}"></div></div></div>` : ''}
                        <span class="dept-badge">${m.departments.length} dept${m.departments.length>1?'s':''}</span>
                    </div>
                    <div class="card-expanded"><ul class="dept-list">${m.departments.map(d=>'<li>'+d+'</li>').join('')}</ul></div>`;
                card.addEventListener('click', () => card.querySelector('.card-expanded').classList.toggle('show'));
                grid.appendChild(card);
            });
            container.innerHTML = '';
            container.appendChild(grid);
        }

        // ========== BUDGET TREEMAP ==========
        function renderBudget() {
            const container = document.getElementById('budgetView');
            const ministries = GOV.ministries.filter(m=>m.budget>0).sort((a,b)=>b.budget-a.budget);
            const total = ministries.reduce((s,m)=>s+m.budget,0);
            const colors = ['#2c3e50','#c0392b','#e74c3c','#9b59b6','#8e44ad','#2980b9','#3498db','#1abc9c','#16a085','#27ae60','#2ecc71','#f39c12','#e67e22','#d35400','#e74c3c','#95a5a6','#7f8c8d','#34495e'];
            let cells = ministries.map((m,i) => {
                const pct = m.budget/total*100;
                const area = Math.max(pct, 1.5);
                return `<div class="treemap-cell" style="flex-basis:${area}%;flex-grow:${area};background:${colors[i%colors.length]};min-width:${Math.max(50,area*3)}px"
                    data-name="${m.name}" data-budget="${m.budget}" data-pct="${pct.toFixed(1)}">
                    ${pct>2?`<div class="treemap-cell-name">${m.name.replace('Ministry of ','')}</div><div class="treemap-cell-value">${formatBudget(m.budget)} (${pct.toFixed(1)}%)</div>`:''}
                </div>`;
            }).join('');
            container.innerHTML = `<div class="treemap-container fade-in"><div class="treemap-header"><div><div class="treemap-total">Union Budget ${GOV.budget.year}</div><div class="treemap-subtitle">Total: ₹${(GOV.budget.totalExpenditure/100000).toFixed(1)} Lakh Crore</div></div></div><div class="treemap">${cells}</div></div>`;
            const tooltip = document.getElementById('treemapTooltip');
            container.querySelectorAll('.treemap-cell').forEach(c => {
                c.addEventListener('mouseenter', () => { tooltip.style.display='block'; tooltip.innerHTML=`<strong>${c.dataset.name}</strong><br>${formatBudget(parseInt(c.dataset.budget))} (${c.dataset.pct}%)`; });
                c.addEventListener('mousemove', e => { tooltip.style.left=(e.clientX+12)+'px'; tooltip.style.top=(e.clientY+12)+'px'; });
                c.addEventListener('mouseleave', () => { tooltip.style.display='none'; });
            });
        }

        window.addEventListener('resize', () => { if (currentView === 'sunburst' && currentRoot) renderSunburst(currentRoot); });
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
